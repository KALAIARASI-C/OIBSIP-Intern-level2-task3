<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List Web App</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center/cover;
}

/* Header */
.header{
    background:#eaeaea;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* Main Layout */
.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
    gap:40px;
}

/* Form Card */
.form-card{
    background:#f2f2f2;
    padding:20px;
    width:300px;
    border-radius:6px;
}

.form-card input,
.form-card textarea{
    width:100%;
    padding:8px;
    margin-bottom:15px;
    border-radius:4px;
    border:1px solid #ccc;
}

.form-card button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

/* Task Section */
.task-section{
    width:650px;
    color:white;
}

/* Header row */
.task-header{
    display:grid;
    grid-template-columns: 1fr 2fr 80px;
    font-weight:bold;
    margin-bottom:10px;
    padding:0 10px;
}

/* Task list */
.task-list{
    list-style:none;
    padding:0;
}

.task-item{
    background:#f1f1f1;
    color:black;
    padding:15px;
    margin-bottom:15px;
    border-radius:5px;
    display:grid;
    grid-template-columns: 1fr 2fr 80px;
    align-items:center;
}

.delete-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    To-Do List Web App
</div>

<div class="container">

    <!-- Left Form -->
    <div class="form-card">
        <input type="text" id="title" placeholder="Title" required>
        <textarea id="description" rows="6" placeholder="Description" required></textarea>
        <button onclick="addTask()">Save</button>
    </div>

    <!-- Right Task List -->
    <div class="task-section">
        <div class="task-header">
            <div>Title</div>
            <div>Description</div>
            <div>Delete</div>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>

</div>

<script>
function addTask(){
    let title = document.getElementById("title").value.trim();
    let description = document.getElementById("description").value.trim();

    if(title === "" || description === ""){
        alert("Please fill out this field.");
        return;
    }

    let li = document.createElement("li");
    li.className = "task-item";

    li.innerHTML = `
        <div>${title}</div>
        <div>${description}</div>
        <div>
            <button class="delete-btn" onclick="deleteTask(this)">X</button>
        </div>
    `;

    document.getElementById("taskList").appendChild(li);

    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
}

function deleteTask(button){
    button.parentElement.parentElement.remove();
}
</script>

</body>
</html>
